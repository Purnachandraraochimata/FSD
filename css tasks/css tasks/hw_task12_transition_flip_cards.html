<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transition Flip Cards</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background-color:whitesmoke;
}

.container{
    display:flex;
    gap:40px;
}

.card{
    width:180px;
    height:250px;
    perspective:1000px;
}

.card-inner{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    border:2px solid red;
    border-radius: 16px;
}

.front,
.back{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:15px;
    font-size:24px;
    font-weight:bold;
    color:red;
    backface-visibility:hidden;
}

.back{
    transform:rotateY(180deg);
}

.card1 .card-inner{
    transition:0.5s;
}

.card1:hover .card-inner{
    transform:rotateY(180deg);
}

.card1 .front{
    background:yellow;
}

.card1 .back{
    background:violet;
}

.card2 .card-inner{
    transition:1s;
}

.card2:hover .card-inner{
    transform:rotateY(180deg);
}

.card2 .front{
    background:brown;
}

.card2 .back{
    background:black;
}

@keyframes flip{
    0%,40%{
        transform:rotateY(0deg);
    }

    50%,90%{
        transform:rotateY(180deg);
    }

    100%{
        transform:rotateY(360deg);
    }
}

.card3 .card-inner{
    animation:flip 4s infinite;
}

.card3 .front{
    background:orange;
}

.card3 .back{
    background:blue;
}

.card4 .card-inner{
    animation:flip 3s infinite;
}

.card4 .front{
    background:pink;
}

.card4 .back{
    background:purple;
}
</style>
</head>
<body>
<div class="container">
    <div class="card card1">
        <div class="card-inner">
            <div class="front">OG</div>
            <div class="back">Jalsa</div>
        </div>
    </div>
    <div class="card card2">
        <div class="card-inner">
            <div class="front">Thar</div>
            <div class="back">Fortuner</div>
        </div>
    </div>
    <div class="card card3">
        <div class="card-inner">
            <div class="front">Ns 200</div>
            <div class="back">GT 650</div>
        </div>
    </div>
    <div class="card card4">
        <div class="card-inner">
            <div class="front">CSK</div>
            <div class="back">RCB</div>
        </div>
    </div>
</div>
</body>
</html>
