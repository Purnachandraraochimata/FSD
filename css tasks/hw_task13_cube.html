<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cube</title>
</head>
<body>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        body{
            background-color:bisque;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow: hidden;
        }
        .container{
            width:220px;
            height:220px;
            display:flex;
            justify-content:center;
            align-items:center;
            perspective:1000px;
        }
        .cube{
            width:200px;
            height:200px;
            position:relative;
            transform-style:preserve-3d;
            animation:cube 8s linear infinite;
        }
        .box{
            position:absolute;
            width:200px;
            height:200px;
            border:3px solid #fff;
            border-radius:10px;
            overflow:hidden;
            backface-visibility:hidden;
            box-shadow:0 0 20px rgba(255,255,255,.5);
        }

        .box img{
            width:100%;
            height:100%;
            object-fit:cover;
        }
        .box span{
            position:absolute;
            bottom:0;
            left:0;
            width:100%;
            padding:8px;
            text-align:center;
            font-size:20px;
            font-weight:bold;
            color:white;
            background:rgba(0,0,0,0.6);
            font-family:Arial, sans-serif;
        }
        .front{
            transform:translateZ(100px);
        }

        .back{
            transform:translateZ(-100px) rotateY(180deg);
        }

        .right{
            transform:rotateY(90deg) translateZ(100px);
        }

        .left{
            transform:rotateY(-90deg) translateZ(100px);
        }

        .top{
            transform:rotateX(90deg) translateZ(100px);
        }

        .bottom{
            transform:rotateX(-90deg) translateZ(100px);
        }

        @keyframes cube{
           0%{
               transform:rotateX(0deg) rotateY(0deg);
            }
            25%{
               transform:rotateX(90deg) rotateY(90deg);
            }
            50%{
               transform:rotateX(180deg) rotateY(180deg);
            }
            75%{
               transform:rotateX(270deg) rotateY(270deg);
            }
            100%{
               transform:rotateX(360deg) rotateY(360deg);
            }
        }
    </style>
</body>
    <div class="container">
        <div class="cube">
            <div class="box front">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSe3YSetaX48UPnKGHN8vH3eXD8I5pm1ralCFKxz9tCCA&s=10" alt="Iron Man">
                <span>Fortuner</span>
            </div>
            <div class="box back">
                <img src="https://www.google.com/imgres?q=thar%20pinterest&imgurl=https%3A%2F%2Fi.pinimg.com%2F474x%2F34%2Fea%2Fa0%2F34eaa0cdb23dba90ab791b2fca448305.jpg&imgrefurl=https%3A%2F%2Fwww.pinterest.com%2Fideas%2Fnight-thar-car%2F931493236176%2F&docid=Earlz9uZNHUaiM&tbnid=fy_wzAdcSFbB6M&vet=12ahUKEwiJl_f5ueCVAxWfbGwGHTHoMBYQnPAOegQIShAA..i&w=474&h=592&hcb=2&ved=2ahUKEwiJl_f5ueCVAxWfbGwGHTHoMBYQnPAOegQIShAA" alt="Spider Man">
                <span>Thar</span>
            </div>
            <div class="box left">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRZt46JCZpTUUK1_oyJJFtWl8Cp_gHYcxsGq2dnPtFnTQ&s=10" alt="Hulk">
                <span>Jalsa</span>
            </div>
            <div class="box right">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQGj0STPgv8Rjv0utgQgPf7P2YlpPRMVd1GWYjWrs6Mcw&s=10" alt="Thor">
                <span>OG</span>
            </div>
            <div class="box top">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSq19KkqkYD4-eT1RUKydnyN-NyTQGYpRoC5TdalswI5Q&s" alt="Loki">
                <span>CSK</span>
            </div>
            <div class="box bottom">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTFvNdIBwx0i0dCpLNla97VAz2m3rftu3INB9PFUn9Uow&s=10" alt="Doom">
                <span>RCb</span>
            </div>
        </div>
    </div>
</html>
