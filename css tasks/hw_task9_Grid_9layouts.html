    <title>9 Layout patterns</title>
    <style>
        body{
            background: black;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
        }
        .layout{
            border-radius: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            width: 400px;
            height: 200px;
            gap: 4px;
            background: rgb(55, 51, 61);
        }
        .topbar{
            display: flex;
            gap: 5px;
            padding: 5px;
        }
        .dot{
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .red{
            background-color: red;
        }
        .yellow{
            background-color: yellow;
        }
        .green{
            background-color: green;
        }
        .bar{
            flex: 1;
            height: 10px;
            background: white;
            border-radius: 2px;
        }
        .l1{
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 10px;
            width: 390px;
            height: 170px;
            margin: auto;
        }
        .box{
            display: grid;
        }
        .b1{background-color: red;}
        .b2{background-color: rgb(250, 136, 23);}
        .b3{background-color: rgb(248, 248, 7);}
