<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Box Model</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      h1 {
        text-align: center;
      }
      #one {
        margin-left: 40%;
        margin-top: 30px;
        margin-bottom: 10px;
        height: 600px;
        width: 300px;
        border: 2px solid black;
        border-radius: 10px;
      }
      #two {
        margin-top: 30px;
        margin-left: 57px;
        height: 400px;
        width: 180px;
        border: 2px solid black;
        border-radius: 10px;
        padding: 10px;
        background-color: black;
      }
      #a {
        margin-top: 10px;
        margin-left: 25px;
        height: 100px;
        width: 100px;
        border: 2px solid white;
        border-radius: 50%;
        background-color: red;
        text-align: center;
        font-size: x-small;
        padding-top: 25px;
      }
      #b {
        margin-top: 10px;
        margin-left: 25px;
        height: 100px;
        width: 100px;
        border: 2px solid white;
        border-radius: 50%;
        background-color: orange;
        text-align: center;
        font-size: small;
        padding-top: 30px;
      }
      #c {
        margin-top: 10px;
        margin-left: 25px;
        height: 100px;
        width: 100px;
        border: 2px solid white;
        border-radius: 50%;
        background-color: green;
        text-align: center;
        font-size: small;
        padding-top: 25px;
      }
      #btm {
        text-align: center;
        margin-top: 20px;
        font-weight: bold;
      }
      #btm1 {
        text-align: center;
      }
      #str {
        height: 80px;
        width: 15px;
        background-color: black;
        margin-left: 45%;
      }
      #bahu {
        height: 500px;
        width: 303px;
        margin-left: 40%;
        margin-top: 10px;
        margin-bottom: 10px;
        border: 2px solid black;
        border-radius: 10px;
      }
      img {
        width: 300px;
        height: 400px;
      }
      #bali {
        text-align: center;
        margin-top: 30px;
        font-weight: bolder;
      }
      #rat {
        text-align: center;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <h1>CSS Box Model Task.</h1>
    <div id="one">
      <div id="two">
        <p id="a">STOP PROCASTINATION</p>
        <p id="b">GET READY <br />TO LEARN</p>
        <p id="c">START <br />YOUR JOURNEY</p>
      </div>
      <div id="str"></div>
      <p id="btm">FULLSTACK EXPERTS <br />ACADEMY</p>
      <p id="btm1">Learn &bull; Build &bull; Grow🚀</p>
    </div>
    <hr />
    <div id="bahu">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSKTjG36FmxQc20Llu9m3grk88yoYHGrxEf2vzOwRkt_A&s=10" width="590" height="800" alt="" />
      <p id="bali">Jalsa</p>
      <p id="rat">Rating: ♾️/5 ⭐</p>
    </div>
  </body>
</html>
