<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moon Phases</title>

<style>

body{
    margin:0;
    background:#000;
    font-family:Arial, Helvetica, sans-serif;
}

h1{
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    gap:40px;
    padding:40px;
}

.moon{
    width:100px;
    height:100px;
    border-radius:50%;
    background:white;
    position:relative;
    overflow:hidden;
}

/* Common overlay */
.moon::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    border-radius:50%;
    background:black;
}

/* 🌑 New Moon */
.new{
    background:black;
    box-shadow:0 0 10px white;
}
.new::before{
    display:none;
}

/* 🌒 Waxing Crescent */
.waxing-crescent::before{
    left:-70%;
}

/* 🌓 First Quarter */
.first-quarter::before{
    left:-50%;
}

/* 🌔 Waxing Gibbous */
.waxing-gibbous::before{
    left:-20%;
}

/* 🌕 Full Moon */
.full::before{
    display:none;
}

/* 🌖 Waning Gibbous */
.waning-gibbous::before{
    left:20%;
}

/* 🌗 Last Quarter */
.last-quarter::before{
    left:50%;
}

/* 🌘 Waning Crescent */
.waning-crescent::before{
    left:70%;
}

.name{
    color:white;
    text-align:center;
    margin-top:10px;
    font-size:14px;
}

.phase{
    text-align:center;
}

</style>

</head>
<body>

<h1>Moon Phases</h1>

<div class="container">

<div class="phase">
<div class="moon new"></div>
<div class="name">New Moon</div>
</div>

<div class="phase">
<div class="moon waxing-crescent"></div>
<div class="name">Waxing Crescent</div>
</div>

<div class="phase">
<div class="moon first-quarter"></div>
<div class="name">First Quarter</div>
</div>

<div class="phase">
<div class="moon waxing-gibbous"></div>
<div class="name">Waxing Gibbous</div>
</div>

<div class="phase">
<div class="moon full"></div>
<div class="name">Full Moon</div>
</div>

<div class="phase">
<div class="moon waning-gibbous"></div>
<div class="name">Waning Gibbous</div>
</div>

<div class="phase">
<div class="moon last-quarter"></div>
<div class="name">Last Quarter</div>
</div>

<div class="phase">
<div class="moon waning-crescent"></div>
<div class="name">Waning Crescent</div>
</div>

</div>

</body>
</html>
