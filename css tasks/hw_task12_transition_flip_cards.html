<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transition Flip Cards</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background-color: skyblue;
}

.container{
    display:flex;
    gap:40px;
}

.card{
    width:180px;
    height:250px;
    perspective:1000px;
}

.card-inner{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    border:2px solid black;
    border-radius: 16px;
}

.front,
.back{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:15px;
    font-size:24px;
    font-weight:bold;
    color:white;
    backface-visibility:hidden;
   
}

.back{
    transform:rotateX(180deg);
}

.card1 .card-inner{
    transition:1s;
}

.card1:hover .card-inner{
    transform:rotateX(180deg);
}

.card1 .front{
    background:red;
}

.card1 .back{
    background:green;
    font-size: larger;
}

.card2 .card-inner{
    transition:1s;
    
}

.card2:hover .card-inner{
    transform:rotateY(180deg);
}

.card2 .front{
    background:blue;
}

.card2 .back{
    background:orange;
    transform:rotateY(180deg)
}
@keyframes flip{
    0%,40%{
        transform:rotateX(0deg);
    }

    50%,90%{
        transform:rotateX(180deg);
    }

    100%{
        transform:rotateX(360deg);
    }
}

.card3 .card-inner{
    animation-name: flip;
    animation-duration: 4s;
    animation-timing-function: linear;
    animation-delay: 0s;
    animation-iteration-count: infinite;
    animation-direction: normal;
    animation-fill-mode: forwards;
}
.card3 .front{
    background:purple;
}

.card3 .back{
    background:gold;
}
@keyframes flip1{
    0%,40%{
        transform:rotateY(0deg);
    }

    50%,90%{
        transform:rotateY(180deg);
    }

    100%{
        transform:rotateY(360deg);
    }
}

.card4 .card-inner{
    animation-name:flip1;
    animation-duration:3s;
    animation-iteration-count:infinite;
    animation-timing-function:linear;
}
.card4 .front{
    background:blueviolet;
}

.card4 .back{
    background:black;
     transform:rotateY(180deg);
}
</style>
</head>
<body>
<div class="container">
    <div class="card card1">
        <div class="card-inner">
            <div class="front">Non Veg</div>
            <div class="back">Veg</div>
        </div>
    </div>
    <div class="card card2">
        <div class="card-inner">
            <div class="front">Jalsa</div>
            <div class="back">og</div>
        </div>
    </div>
    <div class="card card3">
        <div class="card-inner">
            <div class="front">Hyd</div>
            <div class="back">Guntur</div>
        </div>
    </div>
    <div class="card card4">
        <div class="card-inner">
            <div class="front">CSK</div>
            <div class="back">RCB</div>
        </div>
    </div>
</div>
</body>
</html>
