<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centered Circular Badges</title>
    <style>
       /* * {
           box-sizing: border-box;
           margin: 0;
           padding: 0;
       } */

       body {
           display: flex;
           justify-content: center;
           align-items: center;
           min-height: 100vh;
           background-color:burlywood
       }

       #box3 {
           text-shadow: 2px 4px 4px;
           color: rgba(6, 245, 66, 0.926);
           text-align: center;
           font-family: algerian;
           font-weight: bold;
       }

       .container {
           height: 400px;
           width: 400px;
           border: 10px solid green;
           border-radius: 50%;
           display: flex;
           justify-content: center;
           align-items: center;
           background-color: skyblue;
           
       }

       #box1 {
           height: 250px;
           width: 250px;
           border-radius: 50%;
           border: 10px solid red;
           display: flex;
           justify-content: center;
           align-items: center;
           background-color: lightsalmon
       }

       #box2 {
          height: 150px;
          width: 150px;
          border: 10px solid green;
          border-radius: 50%;
          display: flex;
          justify-content: center; /* Fixed typo from 'aroun' */
          align-items: center;
          background-color: red;
       }
       .a{
        border: 5px solid yellow;
        padding: 20px;
       }
       #bot{
          height: 550px;
          width: 550px;
          border: 10px solid blueviolet;
          border-radius: 50%;
          display: flex;
          justify-content: center;
          align-items: center;
          background-color: bisque;
       }
    </style>
</head>
<body>
    <div class="a">
    <div id="bot">
    <div class="container">
        <div id="box1">
            <div id="box2">
                <div id="box3">Full Stack<br>Developer</div>
            </div>
        </div>
    </div> 
    </div>
    </div>
</body>
</html>
